<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Task RPG - Mobile</title>
<style>
  :root {
    --bg-base: #111116;
    --panel-bg: #1e1e24;
    --accent: #00e5ff;
    --accent-glow: rgba(0, 229, 255, 0.5);
    --success: #39ff14;
    --text-main: #f0f0f0;
    --text-sub: #aaa;
    --ui-border: rgba(255, 255, 255, 0.1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
  
  body {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    background-color: var(--bg-base);
    color: var(--text-main);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden; /* スクロールは特定エリアのみに制限 */
  }

  /* 上部：ステータスヘッダー */
  .header {
    height: 50px;
    background: rgba(0, 0, 0, 0.8);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 15px;
    border-bottom: 1px solid var(--ui-border);
    font-size: 0.9em;
    z-index: 10;
  }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .level-badge {
    background: var(--accent); color: #000;
    padding: 2px 8px; border-radius: 4px; font-weight: bold;
  }
  .header-right { color: var(--accent); font-weight: bold; }

  /* コンテンツエリア（タブ切り替えで中身が変わる場所） */
  .main-content {
    flex-grow: 1;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  /* --- ホームタブ（キャラ＆タスク） --- */
  #tab-home {
    display: flex;
    flex-direction: column;
    height: 100%;
  }

  /* 上半分：キャラクターエリア */
  .character-area {
    flex: 0 0 45%; /* 画面の上半分弱を占有 */
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    position: relative;
    display: flex;
    justify-content: center;
    align-items: flex-end;
    border-bottom: 2px solid var(--accent);
  }
  /* キャラクターのプレースホルダー（立ち絵が入る想定） */
  .character-sprite {
    width: 200px;
    height: 90%;
    background: rgba(255,255,255,0.05);
    border: 1px dashed var(--accent);
    border-bottom: none;
    display: flex; justify-content: center; align-items: center;
    color: var(--accent);
    font-size: 0.8em;
  }
  /* キャラクターのセリフ枠 */
  .dialogue-box {
    position: absolute;
    bottom: 10px;
    left: 10px; right: 10px;
    background: rgba(0, 0, 0, 0.7);
    border: 1px solid var(--ui-border);
    padding: 10px 15px;
    border-radius: 8px;
    font-size: 0.85em;
    backdrop-filter: blur(4px);
  }

  /* 下半分：タスクリストエリア */
  .task-area {
    flex: 1;
    background: var(--bg-base);
    overflow-y: auto;
    padding: 15px;
    padding-bottom: 20px; /* タブバーの被り防止 */
  }
  .task-header {
    display: flex; justify-content: space-between;
    margin-bottom: 15px; font-size: 0.9em; color: var(--text-sub);
  }
  
  .task-list { list-style: none; }
  .task-item {
    background: var(--panel-bg);
    margin-bottom: 10px; padding: 15px;
    border-radius: 8px;
    display: flex; align-items: center;
    border-left: 4px solid var(--accent);
    box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    transition: 0.3s;
  }
  .task-item.completed {
    background: #1a1a1f;
    border-left-color: var(--success);
    opacity: 0.6;
    transform: scale(0.98);
  }
  
  /* チェックボックスの演出 */
  .checkbox {
    width: 28px; height: 28px;
    border: 2px solid var(--accent);
    border-radius: 50%;
    margin-right: 15px;
    display: flex; justify-content: center; align-items: center;
    transition: 0.2s;
  }
  .completed .checkbox {
    background: var(--success); border-color: var(--success);
    box-shadow: 0 0 12px var(--success);
  }
  .checkbox::after {
    content: '✓'; color: #000; font-weight: bold;
    opacity: 0; font-size: 1.2em;
  }
  .completed .checkbox::after { opacity: 1; }
  .task-title { font-size: 0.95em; }

  /* --- その他のタブ（プレースホルダー） --- */
  .tab-pane { display: none; padding: 20px; height: 100%; overflow-y: auto; }
  .tab-pane.active { display: block; }
  #tab-home.active { display: flex; } /* ホームタブ用の特別処理 */

  /* 下部：タブナビゲーション */
  .bottom-nav {
    height: 65px;
    background: #0a0a0d;
    border-top: 1px solid var(--ui-border);
    display: flex;
    justify-content: space-around;
    align-items: center;
    padding-bottom: env(safe-area-inset-bottom); /* iPhoneX以降の対応 */
    z-index: 10;
  }
  .nav-item {
    display: flex; flex-direction: column; align-items: center;
    color: var(--text-sub); font-size: 0.7em;
    gap: 4px; transition: 0.2s;
  }
  .nav-item.active { color: var(--accent); }
  .nav-icon {
    width: 24px; height: 24px;
    background: #333; border-radius: 4px;
    display: flex; justify-content: center; align-items: center;
    font-size: 1.2em;
  }
  .nav-item.active .nav-icon {
    background: var(--accent-glow);
    border: 1px solid var(--accent);
  }

</style>
</head>
<body>

<!-- 上部情報 -->
<div class="header">
  <div class="header-left">
    <div class="level-badge">Lv.12</div>
    <span>タンク型</span>
  </div>
  <div class="header-right">
    💎 150
  </div>
</div>

<!-- メインコンテンツ -->
<div class="main-content">
  
  <!-- ホームタブ (上半分キャラ / 下半分タスク) -->
  <div id="tab-home" class="tab-pane active">
    <div class="character-area">
      <div class="character-sprite">キャラ立ち絵<br>(Live2D等)</div>
      <div class="dialogue-box" id="dialogueText">
        「司令、今日のデイリーミッションを受注しました。準備はいいですか？」
      </div>
    </div>
    <div class="task-area">
      <div class="task-header">
        <span>デイリーミッション (動画制作セット)</span>
        <span>0/3</span>
      </div>
      <ul class="task-list">
        <li class="task-item" onclick="completeTask(this)">
          <div class="checkbox"></div>
          <div class="task-title">編集ソフトを起動する</div>
        </li>
        <li class="task-item" onclick="completeTask(this)">
          <div class="checkbox"></div>
          <div class="task-title">素材フォルダを開く</div>
        </li>
        <li class="task-item" onclick="completeTask(this)">
          <div class="checkbox"></div>
          <div class="task-title">タイムラインに素材を置く</div>
        </li>
      </ul>
    </div>
  </div>

  <!-- 編成/ステータスタブ -->
  <div id="tab-status" class="tab-pane">
    <h2>📊 ステータス＆ロール</h2>
    <p style="margin-top:20px; color:var(--text-sub);">
      ここに6段階（0〜5）のレーダーチャートや、ロール（タンク/ダメージ）の変更画面が入ります。
    </p>
  </div>

  <!-- エコータブ (オンライン) -->
  <div id="tab-echo" class="tab-pane">
    <h2>📡 エコー通信</h2>
    <p style="margin-top:20px; color:var(--text-sub);">
      ここに他のプレイヤーのタスク完了報告がリアルタイムで流れるタイムラインが入ります。
    </p>
  </div>

</div>

<!-- 下部タブナビゲーション -->
<div class="bottom-nav">
  <div class="nav-item active" onclick="switchTab('tab-home', this)">
    <div class="nav-icon">🏠</div>
    <span>ホーム</span>
  </div>
  <div class="nav-item" onclick="switchTab('tab-status', this)">
    <div class="nav-icon">⚙️</div>
    <span>編成</span>
  </div>
  <div class="nav-item" onclick="switchTab('tab-echo', this)">
    <div class="nav-icon">📡</div>
    <span>通信</span>
  </div>
  <div class="nav-item" onclick="alert('ショップ画面は未実装です')">
    <div class="nav-icon">💎</div>
    <span>ショップ</span>
  </div>
</div>

<script>
  // タスク完了時の処理（脳汁演出とキャラセリフの変化）
  function completeTask(element) {
    if (element.classList.contains('completed')) return;
    
    // タスクを完了状態にする
    element.classList.add('completed');
    
    // スマホのバイブレーションを鳴らす（対応機種のみ）
    if (navigator.vibrate) {
      navigator.vibrate(50); // 短く鋭い振動で「ヒット感」を出す
    }

    // キャラクターのセリフをランダムに変更してフィードバック
    const dialogues = [
      "「目標クリア！その調子です！」",
      "「いい動きですね。次も行きましょう。」",
      "「一つ片付きましたね。お疲れ様です。」"
    ];
    document.getElementById('dialogueText').innerText = dialogues[Math.floor(Math.random() * dialogues.length)];
  }

  // タブ切り替え処理
  function switchTab(tabId, navElement) {
    // 全てのタブとナビゲーションのアクティブを解除
    document.querySelectorAll('.tab-pane').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    
    // 選択されたものをアクティブにする
    document.getElementById(tabId).classList.add('active');
    navElement.classList.add('active');
  }
</script>
</body>
</html>
